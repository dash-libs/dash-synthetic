name: Daily Health Check

on:
  schedule:
    - cron: "0 6 * * *"   # Every day 06:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=dashdq --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  daily-commit:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update health log
        run: |
          mkdir -p .health
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') | tests=passed | python=3.9,3.10,3.11" >> .health/log.txt

      - name: Commit health log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .health/log.txt
          git diff --staged --quiet || git commit -m "ci: daily health check $(date -u '+%Y-%m-%d')"
          git push
